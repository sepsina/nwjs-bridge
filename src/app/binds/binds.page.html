<div class="col-top-strech"
     cdkDrag
     cdkDragRootElement="#binds-dlg"
     cdkDragBoundary="#modal-container">

    <div class='row-right-stretch dlg-header'>
        <div class="row-left dlg-title" cdkDragHandle>
            binds
        </div>
        <button (click)="close()">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <div class="col-top-strech" id="dlg-body">
        <div class="col-top-strech cards-common">
            <div class="row-center">
                <label>source:</label>
                <select #bindSrcSel
                        (change)="bindSrcSelected(bindSrcSel.value)">
                    @for(bind of allBindSrc; track bind; let i = $index) {
                        <option value="{{i}}">
                            {{bind.name}}
                        </option>
                    }
                </select>
            </div>
            <div class="row-right">
                <label>name:</label>
                <input #bindName
                        type="text"
                        size="12"
                        [maxLength]="maxNameLen"
                        (change)="onNameChange(bindName.value)"
                        (blur)="onNameBlur(bindName.value)">
                <button (click)="wrBindName()">
                    save
                </button>
            </div>
            <div class="col-top-strech part-desc">
                @for(desc of bindSrcDesc; track desc.key){
                    <div>
                        <span class="desc-label">{{desc.key}}</span>
                        <span class="desc-value">{{desc.value}}</span>
                    </div>
                }
            </div>
        </div>

        <div class="col-top-strech cards-common">
            <div class="row-center">
                <label>destination:</label>
                <select #bindDstSel
                        (change)="bindDstSelected(bindDstSel.value)">
                    @for(bind of freeBindDst; track bind; let i = $index) {
                        <option value="{{i}}">
                            {{bind.name}}
                        </option>
                    }
                </select>
            </div>
            <div class="col-top-strech part-desc">
                @for(desc of bindDstDesc; track desc.key){
                    <div>
                        <span class="desc-label">{{desc.key}}</span>
                        <span class="desc-value">{{desc.value}}</span>
                    </div>
                }
            </div>
        </div>
    </div>
    <div class='row-right dlg-header'>
        <button (click)="wrSrcBinds()">
            send
        </button>
    </div>
</div>
