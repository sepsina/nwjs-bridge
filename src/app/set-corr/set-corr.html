<div class="col-top-strech" id="all-dlg"
     cdkDrag
     cdkDragRootElement="#corr-dlg"
     cdkDragBoundary="#modal-container">

    <div class='row-right-stretch dlg-header'>
        <div class="row-left dlg-title" cdkDragHandle>
            {{title}}
        </div>
        <button (click)="close()">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <div class="col-top-strech" id="dlg-body">
        <div class="col-top-strech cards-common">
            <div class="row-center">
                <label>units:</label>
                <select #unitSel
                        (change)="unitSelected(unitSel.value)" >
                    @for(unit of allUnits; track unit; let i = $index) {
                        <option value="{{i}}">
                            {{unit.name}}
                        </option>
                    }
                </select>
            </div>
            <div class="row-left">
                <label>offset:</label>
                <input #offset
                       type="number"
                       (change)="onOffsetChange(offset.value)"
                       (blur)="onOffsetBlur(offset.value)">
            </div>
        </div>
    </div>

    <div class='row-right dlg-header'>
        <button (click)="save()">
            save
        </button>
    </div>
</div>
