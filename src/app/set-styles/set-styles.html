<div class="col-top-strech"
     cdkDrag
     cdkDragRootElement="#styles-dlg"
     cdkDragBoundary="#modal-container">

    <div class='row-right dlg-header'>
        <div class="row-left dlg-title" cdkDragHandle>
            {{dlg_title}}
        </div>
        <button (click)="close()">
            <i class="fa fa-times"></i>
        </button>
    </div>

    <div class="row-center" id="testCont">
        <div #testView>
            {{test_text}}
        </div>
    </div>

    <div class="col-top-strech" id="dlg-body">
        <div class="row-left">
            <label>font size:</label>
            <input #attrFontSize
                id="attrFontSize"
                type="number"
                [min]="minFontSize"
                [max]="maxFontSize"
                required
                [ngModel]="style.fontSize"
                (ngModelChange)="onFontSizeChange(attrFontSize.value)"
                (blur)="onFontSizeBlur(attrFontSize.value)">
        </div>
        <div class="row-left">
            <label>text color:</label>
            <input #attrColor
                id="attrColor"
                type="color"
                [ngModel]="style.color"
                (change)="onColorChange(attrColor.value)">
        </div>
        <div class="row-left">
            <label>background color:</label>
            <input #attrBackgroundColor
                id="attrBackgroundColor"
                type="color"
                [ngModel]="style.bgColor"
                (change)="onBackgroundColorChange(attrBackgroundColor.value)">
        </div>
        <div class="row-left">
            <label>opacity:</label>
            <input #attrOpacity
                id="attrOpacity"
                type="range"
                min="0"
                max="1"
                step="0.1"
                [ngModel]="style.bgOpacity"
                (change)="onOpacityChange(attrOpacity.value)">
        </div>
        <div class="col-top-strech cards-common">
            <div class="row-left">
                border:
            </div>
            <div class="row-left">
                <label>color:</label>
                <input #attrBorderColor
                    id="attrBorderColor"
                    type="color"
                    [ngModel]="style.borderColor"
                    (change)="onBorderColorChange(attrBorderColor.value)">
            </div>
            <div class="row-left">
                <label>width:</label>
                <input #attrBorderWidth
                        id="attrBorderWidth"
                        type="number"
                        min="0"
                        [max]="maxBorderWidth"
                        [ngModel]="style.borderWidth"
                        (ngModelChange)="onBorderWidthChange(attrBorderWidth.value)"
                        (blur)="onBorderWidthBlur(attrBorderWidth.value)">
            </div>
            <div class="row-left">
                <label>radius:</label>
                <input #attrBorderRadius
                        id="attrBorderRadius"
                        type="number"
                        min="0"
                        [max]="maxBorderRadius"
                        [ngModel]="style.borderRadius"
                        (ngModelChange)="onBorderRadiusChange(attrBorderRadius.value)"
                        (blur)="onBorderRadiusBlur(attrBorderRadius.value)">
            </div>
            <div class="row-left">
                <label>style:</label>
                <select id="borderStyle"
                        #borderStyle
                        [ngModel]="style.borderStyle"
                        (change)="onBorderStyleChange(borderStyle.value)">
                    @for(style of borderStyles; track style) {
                        <option value="{{style}}">
                            {{style}}
                        </option>
                    }
                </select>
            </div>
        </div>
        <div class="col-top-strech cards-common">
            <div class="row-left">
                paddings:
            </div>
            <div class="row-center">
                <input #attrPaddingTop
                    id="attrPaddingTop"
                    type="number"
                    min="0"
                    [max]="maxPaddingTop"
                    required
                    [ngModel]="style.paddingTop"
                    (ngModelChange)="onPaddingTopChange(attrPaddingTop.value)"
                    (blur)="onPaddingTopBlur(attrPaddingTop.value)">
            </div>
            <div class="row-center">
                <div class="col-center">
                    <input #attrPaddingLeft
                    id="attrPaddingLeft"
                    type="number"
                    min="0"
                    [max]="maxPaddingLeft"
                    required
                    [ngModel]="style.paddingLeft"
                    (ngModelChange)="onPaddingLeftChange(attrPaddingLeft.value)"
                    (blur)="onPaddingLeftBlur(attrPaddingLeft.value)">
                </div>
                <div class="col-center" id="padd-rect">
                </div>
                <div class="col-center">
                    <input #attrPaddingRight
                    id="attrPaddingRight"
                    type="number"
                    min="0"
                    [max]="maxPaddingRight"
                    required
                    [ngModel]="style.paddingRight"
                    (ngModelChange)="onPaddingRightChange(attrPaddingRight.value)"
                    (blur)="onPaddingRightBlur(attrPaddingRight.value)">
                </div>
            </div>
            <div class="row-center">
                <input #attrPaddingBottom
                    id="attrPaddingBottom"
                    type="number"
                    min="0"
                    [max]="maxPaddingBottom"
                    required
                    [ngModel]="style.paddingBottom"
                    (ngModelChange)="onPaddingBottomChange(attrPaddingBottom.value)"
                    (blur)="onPaddingBottomBlur(attrPaddingBottom.value)">
            </div>

        </div>
    </div>

    <div class="row-right dlg-header">
        <div>
            <button id="saveBtn"
                    (click)="save()">
                save
            </button>
        </div>
    </div>
</div>
